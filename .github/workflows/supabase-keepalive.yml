name: Supabase Keepalive

on:
  schedule:
    # Every 12 hours to prevent inactivity pause.
    - cron: "17 */12 * * *"
  workflow_dispatch:

jobs:
  wakeup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "psycopg2-binary==2.9.9"

      - name: Wake Supabase Postgres
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "${SUPABASE_DATABASE_URL}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_DATABASE_URL"
            exit 1
          fi
          python scripts/supabase_keepalive.py
